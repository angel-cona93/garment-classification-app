services:
  backend:
    build: ./app/backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    environment:
      - FASHION_AI_DB=/app/data/fashion_ai.db
      - MODEL_PROVIDER=${MODEL_PROVIDER:-claude}
      # Claude
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # Ollama
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llava}

  frontend:
    build: ./app/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
